<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CV JAMPE AGENG TRADE - HRIS</title>
    
    <!-- 1. PRE-HEAD ERROR CATCHER -->
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            try {
                var loader = document.getElementById('init-loader');
                if(loader) loader.style.display = 'none';
                var catcher = document.getElementById('error-catcher');
                if (catcher) {
                    catcher.style.display = 'flex';
                    document.getElementById('error-message').innerText = message + " (Baris: " + lineno + ")";
                } else {
                    alert("Error Sistem: " + message);
                }
            } catch(e) { alert("Fatal Error: " + message); }
            return true;
        };
    </script>

    <!-- Library Eksternal -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Global Styles & CSS Time-Bomb -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; border-top: 1px solid #334155; display: flex; justify-content: space-around; padding: 0.5rem 0; z-index: 50; padding-bottom: env(safe-area-inset-bottom, 1rem); }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 20%; color: #94a3b8; font-size: 0.7rem; text-decoration: none; transition: 0.2s; }
        .nav-item i { font-size: 1.25rem; margin-bottom: 2px; }
        .nav-item.active { color: #3b82f6; font-weight: bold; }
        .nav-item.active i { transform: translateY(-2px); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .loader-spin { border: 4px solid rgba(255,255,255,0.1); border-left-color: #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* FAILSAFE: Hancurkan Loading Screen Otomatis setelah 3 detik */
        @keyframes autoKillLoader {
            0% { opacity: 1; z-index: 100; }
            90% { opacity: 1; z-index: 100; }
            100% { opacity: 0; z-index: -10; display: none; visibility: hidden; pointer-events: none; }
        }
        #init-loader {
            animation: autoKillLoader 3s forwards !important;
        }
    </style>
</head>
<body class="antialiased text-slate-300">

    <!-- Kotak Darurat Error -->
    <div id="error-catcher" style="display:none; position:fixed; inset:0; z-index:9999; background-color:#881337; flex-direction:column; align-items:center; justify-content:center; padding:1.5rem; text-align:center; color:white;">
        <i class="fas fa-exclamation-triangle" style="font-size:3rem; color:#fecdd3; margin-bottom:1rem;"></i>
        <h2 style="font-size:1.5rem; font-weight:bold; margin-bottom:0.5rem;">Sistem Gagal Memuat</h2>
        <p id="error-message" style="background-color:#4c0519; padding:1rem; border-radius:0.5rem; font-family:monospace; font-size:0.875rem; max-width:100%; overflow-x:auto; margin-bottom:1rem;"></p>
        <button onclick="window.location.reload()" style="background-color:white; color:#881337; padding:0.5rem 1.5rem; border-radius:9999px; font-weight:bold; border:none; cursor:pointer;">Muat Ulang Paksa</button>
    </div>

    <!-- Initial Loader -->
    <div id="init-loader" class="fixed inset-0 bg-slate-900 flex flex-col items-center justify-center">
        <div class="loader-spin mb-4"></div>
        <p class="text-slate-400 font-medium tracking-wide animate-pulse">Menyiapkan Antarmuka...</p>
    </div>

    <!-- Main Container -->
    <div id="app-container" class="h-screen w-screen flex overflow-hidden">
    </div>

    <!-- 2. CORE LOGIC SCRIPT API (VERCEL EDITION) -->
    <script>
        // === PENTING: GANTI DENGAN URL WEB APP GOOGLE ANDA ===
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxzWJCKT6eS4siMjZP7cefj3v0ljxFrKkMQTegllh7wMm4XoygLYG3WGhu1aEiUKPBR/exec";
        // ======================================================

        // Jembatan Fetch API ke Google Backend
        async function apiCall(actionName, payloadData = {}) {
            try {
                if (GAS_URL === "ISI_URL_GOOGLE_WEB_APP_ANDA_DISINI") {
                    throw new Error("URL API Belum Dikonfigurasi di file Index.html (Vercel)");
                }
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // Wajib text/plain agar tidak diblok CORS Google
                    body: JSON.stringify({ action: actionName, data: payloadData }),
                    redirect: 'follow'
                });
                
                const json = await response.json();
                if (json.status === 'error') throw new Error(json.message);
                return json.result;
            } catch (err) {
                throw err;
            }
        }

        function safeSwal(title, text, icon) {
            if (typeof Swal !== 'undefined') { Swal.fire(title, text, icon); } 
            else { alert(title + (text ? "\n" + text : "")); }
        }

        var STATE = {
            user: null, role: null, currentView: 'login', token: null,
            employeeData: null, cache: { PendingCounts: {izin: 0, absen: 0, shift: 0, total: 0}, SisaCuti: 12 }
        };

        var SCHEMA = {
            "Employees": ["NIK", "NamaLengkap", "JenisKelamin", "TanggalLahir", "Alamat", "NoHP", "Email", "Divisi", "Jabatan", "Status", "TanggalMasuk", "GajiPokok", "Tunjangan", "BPJS", "NPWP", "Rekening", "Bank"],
            "Shifts": ["NamaShift", "JamMasuk", "JamPulang", "Toleransi"],
            "Locations": ["NamaLokasi", "Latitude", "Longitude", "Radius"],
            "Attendance": ["Tanggal", "JamMasuk", "Nama", "NIK", "LatIn", "LngIn", "JarakIn", "SelfieIn", "StatusMasuk", "JamPulang", "LatOut", "LngOut", "SelfieOut", "StatusPulang", "TerlambatMenit"],
            "Overtime": ["Tanggal", "NIK", "Nama", "JamPulangAktual", "JamPulangNormal", "JamLembur", "TarifPerJam", "TotalUpah"],
            "LeaveBalances": ["NIK", "Tahun", "KuotaCuti", "SisaCuti"],
            "Rates": ["Jabatan", "TarifLembur"],
            "Payroll": ["BulanTahun", "NIK", "Nama", "GajiPokok", "Tunjangan", "UangMakan", "UangTransport", "Lembur", "Bonus", "Insentif", "BPJS_Kes", "BPJS_TK", "Pajak_PPh21", "Alpha", "Terlambat", "Pinjaman", "GajiBersih"],
            "AuditLog": ["User", "Aktivitas", "Tanggal", "Jam", "IP", "Device"]
        };

        var Toast;
        try {
            Toast = Swal.mixin({
                toast: true, position: 'top-end', showConfirmButton: false, timer: 3000,
                timerProgressBar: true, background: '#1e293b', color: '#fff'
            });
        } catch(e) {}

        function clearCache() { STATE.cache = { PendingCounts: (STATE.cache && STATE.cache.PendingCounts) ? STATE.cache.PendingCounts : {izin:0, absen:0, shift:0, total:0}, SisaCuti: 12 }; }
        
        function showLoader(text) {
            var msg = text || 'Memuat...';
            if(document.getElementById('sys-loader')) document.getElementById('sys-loader').remove();
            var loader = document.createElement('div'); loader.id = 'sys-loader';
            loader.className = 'fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[999] flex flex-col items-center justify-center';
            loader.innerHTML = '<div class="loader-spin mb-4"></div><p class="text-white font-medium">' + msg + '</p>';
            document.body.appendChild(loader);
        }
        
        function hideLoader() {
            if(document.getElementById('sys-loader')) document.getElementById('sys-loader').remove();
            var initLoader = document.getElementById('init-loader');
            if(initLoader) initLoader.style.display = 'none';
        }

        // --- UI NAVIGATION & SIDEBAR ---
        function renderBottomNav() {
            var navHTML = '';
            var pendingCounts = STATE.cache['PendingCounts'] || {izin: 0, absen: 0, shift: 0, total: 0};

            if (STATE.role === 'Karyawan') {
                var menus = [
                    { id: 'dashboard', icon: 'fa-home', text: 'Beranda' }, { id: 'absen', icon: 'fa-camera', text: 'Absen' },
                    { id: 'my-attendance', icon: 'fa-calendar-alt', text: 'Log' }, { id: 'izin', icon: 'fa-file-medical', text: 'Izin' },
                    { id: 'slip', icon: 'fa-receipt', text: 'Slip' }
                ];
                navHTML = menus.map(function(m) {
                    var activeClass = STATE.currentView === m.id ? 'active' : '';
                    return '<a href="#" onclick="navigate(\'' + m.id + '\')" class="nav-item ' + activeClass + '"><i class="fas ' + m.icon + '"></i><span>' + m.text + '</span></a>';
                }).join('');
            } else {
                var menus = [
                    { id: 'dashboard', icon: 'fa-chart-pie', text: 'Dashboard' }, 
                    { id: 'absen', icon: 'fa-camera', text: 'Absen' },
                    { id: 'approval', icon: 'fa-check-double', text: 'Izin', badge: pendingCounts.izin }, 
                    { id: 'approval-absen', icon: 'fa-user-check', text: 'Koreksi', badge: pendingCounts.absen },
                    { id: 'menu-more', icon: 'fa-bars', text: 'Lainnya', badge: pendingCounts.shift }
                ];
                navHTML = menus.map(function(m) {
                    var activeClass = STATE.currentView === m.id ? 'active' : '';
                    var clickAction = m.id === 'menu-more' ? 'toggleMobileMenu()' : "navigate('" + m.id + "')";
                    var badgeHTML = m.badge && m.badge > 0 ? '<span class="absolute top-0 right-3 flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-rose-500"></span></span>' : '';
                    return '<a href="#" onclick="' + clickAction + '" class="nav-item relative ' + activeClass + '">' + badgeHTML + '<i class="fas ' + m.icon + '"></i><span>' + m.text + '</span></a>';
                }).join('');
            }
            return '<nav class="bottom-nav md:hidden">' + navHTML + '</nav>';
        }

        window.toggleMobileMenu = function() {
            if(typeof Swal === 'undefined') return alert("Modul gagal dimuat.");
            var pendingCounts = STATE.cache['PendingCounts'] || {shift: 0};
            var shiftBadge = pendingCounts.shift > 0 ? '<div class="absolute -top-2 -right-2 bg-rose-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full shadow-lg border border-rose-700">' + pendingCounts.shift + '</div>' : '';

            var swalHtml = '<div class="grid grid-cols-2 gap-3 text-sm mt-4">' +
                '<button onclick="Swal.close(); navigate(\'Employees\')" class="bg-slate-800 p-3 rounded-xl border border-slate-700 text-slate-300 hover:text-white"><i class="fas fa-users mb-2 text-xl text-blue-400"></i><br>Karyawan</button>' +
                '<button onclick="Swal.close(); navigate(\'Attendance\')" class="bg-slate-800 p-3 rounded-xl border border-slate-700 text-slate-300 hover:text-white"><i class="fas fa-clipboard-list mb-2 text-xl text-amber-400"></i><br>Data Absensi</button>' +
                '<button onclick="Swal.close(); navigate(\'payroll-engine\')" class="bg-slate-800 p-3 rounded-xl border border-slate-700 text-slate-300 hover:text-white"><i class="fas fa-cogs mb-2 text-xl text-indigo-400"></i><br>Payroll Engine</button>' +
                '<button onclick="Swal.close(); navigate(\'laporan\')" class="bg-slate-800 p-3 rounded-xl border border-slate-700 text-slate-300 hover:text-white"><i class="fas fa-print mb-2 text-xl text-emerald-400"></i><br>Laporan</button>' +
                '<button onclick="Swal.close(); navigate(\'slip\')" class="bg-slate-800 p-3 rounded-xl border border-slate-700 text-slate-300 hover:text-white"><i class="fas fa-receipt mb-2 text-xl text-slate-400"></i><br>Slip Gaji</button>' +
                '<button onclick="Swal.close(); navigate(\'approval-shift\')" class="relative bg-slate-800 p-3 rounded-xl border border-slate-700 text-slate-300 hover:text-white">' + shiftBadge + '<i class="fas fa-exchange-alt mb-2 text-xl text-rose-400"></i><br>Tukar Shift</button>' +
                '</div>';

            Swal.fire({
                title: 'Menu Administrator',
                html: swalHtml,
                showConfirmButton: false, showCloseButton: true, background: '#1e293b', color: '#fff', position: 'bottom', customClass: { popup: 'swal-mobile-bottom rounded-t-3xl m-0 w-full' }
            });
        }

        function renderSidebarMenu() {
            var pendingCounts = STATE.cache['PendingCounts'] || {izin: 0, absen: 0, shift: 0};
            var menus = [
                { id: 'dashboard', icon: 'fa-chart-pie', text: 'Dashboard', roles: ['Super Admin', 'HRD', 'Manager', 'Karyawan'] },
                { id: 'absen', icon: 'fa-camera', text: 'Clock In / Out', roles: ['Super Admin', 'HRD', 'Manager', 'Karyawan'] },
                { id: 'my-attendance', icon: 'fa-calendar-check', text: 'Pantau Absensi', roles: ['Super Admin', 'HRD', 'Manager', 'Karyawan'] },
                { id: 'izin', icon: 'fa-file-medical', text: 'Pengajuan Izin', roles: ['Super Admin', 'HRD', 'Manager', 'Karyawan'] },
                { id: 'shift-request', icon: 'fa-exchange-alt', text: 'Tukar Shift', roles: ['Super Admin', 'HRD', 'Manager', 'Karyawan'] },
                { id: 'approval', icon: 'fa-check-double', text: 'Approval Izin', roles: ['Super Admin', 'HRD', 'Manager'], badge: pendingCounts.izin },
                { id: 'approval-absen', icon: 'fa-user-check', text: 'Approval Koreksi', roles: ['Super Admin', 'HRD', 'Manager'], badge: pendingCounts.absen },
                { id: 'approval-shift', icon: 'fa-clock', text: 'Approval Shift', roles: ['Super Admin', 'HRD', 'Manager'], badge: pendingCounts.shift },
                { id: 'Employees', icon: 'fa-users', text: 'Data Karyawan', roles: ['Super Admin', 'HRD'] },
                { id: 'Attendance', icon: 'fa-clipboard-list', text: 'Data Absensi', roles: ['Super Admin', 'HRD', 'Manager'] },
                { id: 'Overtime', icon: 'fa-business-time', text: 'Data Lembur', roles: ['Super Admin', 'HRD', 'Manager'] },
                { id: 'LeaveBalances', icon: 'fa-piggy-bank', text: 'Kuota Cuti', roles: ['Super Admin', 'HRD'] },
                { id: 'Shifts', icon: 'fa-stopwatch', text: 'Master Shift', roles: ['Super Admin', 'HRD'] },
                { id: 'Locations', icon: 'fa-map-marker-alt', text: 'Master Lokasi', roles: ['Super Admin', 'HRD'] },
                { id: 'Rates', icon: 'fa-money-bill-wave', text: 'Tarif Lembur', roles: ['Super Admin', 'HRD'] },
                { id: 'payroll-engine', icon: 'fa-cogs', text: 'Payroll Engine', roles: ['Super Admin', 'HRD'] },
                { id: 'Payroll', icon: 'fa-file-invoice-dollar', text: 'Data Payroll', roles: ['Super Admin', 'HRD'] },
                { id: 'slip', icon: 'fa-receipt', text: 'Slip Gaji', roles: ['Super Admin', 'HRD', 'Manager', 'Karyawan'] },
                { id: 'laporan', icon: 'fa-print', text: 'Laporan', roles: ['Super Admin', 'HRD', 'Manager'] },
                { id: 'AuditLog', icon: 'fa-history', text: 'Audit Log', roles: ['Super Admin'] }
            ];

            return menus.filter(function(m){ return m.roles.includes(STATE.role); }).map(function(m) {
                var activeClass = STATE.currentView === m.id ? 'bg-slate-800 text-blue-400 border-l-4 border-blue-500' : '';
                var badgeHTML = m.badge && m.badge > 0 ? '<span class="ml-auto inline-flex items-center justify-center px-2 py-0.5 text-[10px] font-bold leading-none text-white bg-rose-600 rounded-full shadow-md animate-pulse">' + m.badge + '</span>' : '';
                return '<a href="#" onclick="navigate(\'' + m.id + '\')" class="flex items-center px-4 py-3 text-slate-300 hover:bg-slate-800 hover:text-blue-400 rounded-lg transition-colors mb-1 ' + activeClass + '"><i class="fas ' + m.icon + ' w-6 text-center"></i><span class="font-medium ml-2 text-sm">' + m.text + '</span>' + badgeHTML + '</a>';
            }).join('');
        }

        function renderSidebar() {
            return '<aside class="w-64 glass-panel border-y-0 border-l-0 h-full hidden md:flex flex-col z-40 bg-slate-900 rounded-none shrink-0 relative">' +
                   '<div class="p-6 text-center border-b border-slate-700/50 mt-4">' +
                   '<h1 class="text-xl font-extrabold tracking-wider"><span class="text-blue-400">CV JAMPE</span> <br><span class="text-white text-sm">AGENG TRADE</span></h1>' +
                   '<p class="text-[10px] text-slate-400 mt-2 uppercase tracking-widest bg-slate-800 rounded py-1">' + STATE.role + '</p>' +
                   '</div>' +
                   '<nav class="p-4 flex-1 overflow-y-auto" id="sidebar-nav-container">' + renderSidebarMenu() + '</nav>' +
                   '<div class="p-4 border-t border-slate-700/50">' +
                   '<button onclick="doLogout()" class="w-full flex items-center justify-center px-4 py-2 text-rose-400 hover:bg-rose-500/10 rounded-lg transition"><i class="fas fa-sign-out-alt mr-2"></i> Logout</button>' +
                   '</div></aside>';
        }

        function renderTopBar() {
            var uName = STATE.user || 'User';
            var initial = uName.charAt(0).toUpperCase();
            var nik = STATE.employeeData ? STATE.employeeData.NIK : 'N/A';
            var title = STATE.currentView.replace('-', ' ');
            
            return '<header class="glass-panel border-x-0 border-t-0 p-4 sticky top-0 z-30 bg-slate-900 md:bg-transparent">' +
                   '<div class="flex justify-between items-center max-w-7xl mx-auto">' +
                   '<div class="flex items-center"><h2 class="text-xl font-bold text-white capitalize flex items-center">' + title + '</h2></div>' +
                   '<div class="flex items-center gap-4">' +
                   '<div class="text-right hidden sm:block"><p class="text-sm font-bold text-white">' + uName + '</p><p class="text-[10px] text-blue-400">' + nik + '</p></div>' +
                   '<div class="h-10 w-10 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-500 flex items-center justify-center text-white font-bold shadow-lg border-2 border-slate-700">' + initial + '</div>' +
                   '<button onclick="doLogout()" class="md:hidden text-rose-400 p-2"><i class="fas fa-sign-out-alt text-xl"></i></button>' +
                   '</div></div></header>';
        }

        function navigate(view) {
            STATE.currentView = view;
            var app = document.getElementById('app-container');
            
            if (view === 'login') { app.innerHTML = renderLogin(); hideLoader(); return; }

            app.innerHTML = renderSidebar() + '<main class="flex-1 flex flex-col h-full overflow-hidden relative pb-16 md:pb-0">' + renderTopBar() + '<div id="main-content" class="flex-1 overflow-y-auto p-4 md:p-6 hide-scrollbar relative"></div>' + renderBottomNav() + '</main>';
            loadViewContent();
        }

        function loadViewContent() {
            var container = document.getElementById('main-content');
            var view = STATE.currentView;

            if(view === 'dashboard') loadDashboard(container);
            else if(view === 'absen') loadAttendanceUI(container);
            else if(view === 'my-attendance') loadMyAttendanceUI(container);
            else if(view === 'izin') loadLeaveUI(container);
            else if(view === 'slip') loadSlipUI(container);
            else if(view === 'shift-request') loadShiftRequestUI(container);
            else if(view === 'approval') loadApprovalUI(container, 'Leave');
            else if(view === 'approval-absen') loadApprovalUI(container, 'AttendanceRequests');
            else if(view === 'approval-shift') loadApprovalUI(container, 'ShiftRequests');
            else if(SCHEMA[view]) loadCRUDUI(container, view);
            else if(view === 'payroll-engine') loadPayrollEngineUI(container);
            else if(view === 'laporan') loadReportUI(container);
            else container.innerHTML = '<div class="text-center mt-20 text-slate-400"><i class="fas fa-tools text-4xl mb-4"></i><p>Modul ' + view + ' tidak ditemukan.</p></div>';
        }

        function loadDashboard(container) {
            showLoader("Memuat Dashboard..."); clearCache(); 
            if(!STATE.employeeData && (STATE.role === 'Super Admin' || STATE.role === 'HRD')) { STATE.employeeData = { NIK: 'ADM-000', NamaLengkap: STATE.user || 'Administrator' }; }
            
            apiCall('getDashboardData', { role: STATE.role, nik: STATE.employeeData ? STATE.employeeData.NIK : null })
                .then(function(data) {
                    hideLoader(); 
                    
                    STATE.cache['SisaCuti'] = data.SisaCuti !== undefined ? data.SisaCuti : 12;
                    
                    STATE.cache['PendingCounts'] = {
                        izin: data.PendingLeave || 0, absen: data.PendingAbsen || 0, shift: data.PendingShift || 0,
                        total: (data.PendingLeave || 0) + (data.PendingAbsen || 0) + (data.PendingShift || 0)
                    };
                    
                    var sidebarNav = document.getElementById('sidebar-nav-container');
                    if(sidebarNav) sidebarNav.innerHTML = renderSidebarMenu();
                    
                    var bNav = document.querySelector('.bottom-nav');
                    if(bNav) bNav.outerHTML = renderBottomNav();

                    var isMobile = window.innerWidth <= 768; 
                    var cardsHTML = '';
                    var gridCls = isMobile ? 'flex overflow-x-auto gap-4 hide-scrollbar snap-x' : 'grid grid-cols-2 md:grid-cols-4 gap-4';
                    var cardCls = isMobile ? 'min-w-[150px] snap-center' : '';

                    if (STATE.role === 'Karyawan') {
                        cardsHTML = '<div class="' + gridCls + ' mb-8">' +
                                    '<div class="' + cardCls + ' glass-panel p-5 rounded-2xl border-l-4 border-blue-500 relative overflow-hidden group"><p class="text-slate-400 text-xs font-bold uppercase mb-1">Kehadiran</p><h3 class="text-3xl font-black text-white">' + data.Hadir + ' <span class="text-sm font-normal text-slate-400">hr</span></h3></div>' +
                                    '<div class="' + cardCls + ' glass-panel p-5 rounded-2xl border-l-4 border-rose-500 relative overflow-hidden group"><p class="text-slate-400 text-xs font-bold uppercase mb-1">Terlambat</p><h3 class="text-3xl font-black text-white">' + data.Terlambat + ' <span class="text-sm font-normal text-slate-400">kl</span></h3></div>' +
                                    '<div class="' + cardCls + ' glass-panel p-5 rounded-2xl border-l-4 border-amber-500 relative overflow-hidden group"><p class="text-slate-400 text-xs font-bold uppercase mb-1">Sisa Cuti</p><h3 class="text-3xl font-black text-white">' + data.SisaCuti + ' <span class="text-sm font-normal text-slate-400">hr</span></h3></div>' +
                                    '<div class="' + cardCls + ' glass-panel p-5 rounded-2xl border-l-4 border-emerald-500 relative overflow-hidden group"><p class="text-slate-400 text-xs font-bold uppercase mb-1">Lembur</p><h3 class="text-3xl font-black text-white">' + data.Lembur + ' <span class="text-sm font-normal text-slate-400">jam</span></h3></div>' +
                                    '</div>';
                    } else {
                        cardsHTML = '<div class="' + gridCls + ' mb-8">' +

        function doClock(type) {
            if(!STATE.employeeData) return safeSwal('Error', 'Data Karyawan tidak valid.', 'error');
            var video = document.getElementById('camera-feed'); var canvas = document.getElementById('camera-canvas');
            if(!video.srcObject) return safeSwal('Error', 'Kamera belum aktif.', 'error');

            canvas.width = video.videoWidth; canvas.height = video.videoHeight; canvas.getContext('2d').drawImage(video, 0, 0);
            var photoData = canvas.toDataURL('image/jpeg', 0.7);
            showLoader('Mencari Kordinat GPS...');
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(position){
                        var d = new Date(); var payload = { Tanggal: d.toISOString().split('T')[0], NIK: STATE.employeeData.NIK, Nama: STATE.employeeData.NamaLengkap, SelfieData: photoData };
                        showLoader('Memproses Clock ' + type + '...');
                        
                        if(type === 'IN') { 
                            payload.JamMasuk = d.toLocaleTimeString('id-ID', {hour12:false}); payload.LatIn = position.coords.latitude; payload.LngIn = position.coords.longitude; 
                            apiCall('clockIn', payload)
                                .then(function(res) { hideLoader(); safeSwal('Berhasil', res.message, 'success'); navigate('dashboard'); })
                                .catch(function(err) { hideLoader(); safeSwal('Gagal', String(err), 'error'); });
                        } else { 
                            payload.JamPulang = d.toLocaleTimeString('id-ID', {hour12:false}); payload.LatOut = position.coords.latitude; payload.LngOut = position.coords.longitude; 
                            apiCall('clockOut', payload)
                                .then(function(res) { hideLoader(); safeSwal('Berhasil', res.message, 'success'); navigate('dashboard'); })
                                .catch(function(err) { hideLoader(); safeSwal('Gagal', String(err), 'error'); });
                        }
                    },
                    function(error){ hideLoader(); safeSwal('GPS Error', 'Akses lokasi ditolak.', 'error'); }, { enableHighAccuracy: true, timeout: 10000 }
                );
            } else { hideLoader(); safeSwal('Error', 'Browser tidak mendukung GPS.', 'error'); }
        }

                        preConfirm: function(){ var payload = {}; SCHEMA[sheetName].forEach(function(c){ payload[c] = document.getElementById('inp-' + c).value; }); return payload; }
                    }).then(function(res){ 
                        if (res.isConfirmed) { 
                            showLoader("Update..."); 
                            apiCall('updateRecord', { sheetName: sheetName, id: id, payload: res.value })
                                .then(function(r) { hideLoader(); if(Toast) Toast.fire({icon: 'success', title: r.message}); loadCRUDUI(document.getElementById('main-content'), sheetName); })
                                .catch(function(err) { hideLoader(); safeSwal('Error Server', String(err), 'error'); });
                        } 
                    });
                })
                .catch(function(err) { hideLoader(); safeSwal('Error Server', String(err), 'error'); });
        }

        function loadPayrollEngineUI(container) {
            container.innerHTML = '<div class="max-w-xl mx-auto glass-panel p-8 rounded-3xl text-center border-t-4 border-indigo-500 shadow-2xl shadow-indigo-500/20"><div class="w-24 h-24 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner border border-slate-700"><i class="fas fa-cogs text-5xl text-indigo-400 animate-spin" style="animation-duration: 3s;"></i></div><h2 class="text-2xl font-black text-white mb-2 tracking-tight">Kalkulasi Payroll Massal</h2><p class="text-slate-400 text-sm mb-8 leading-relaxed">Sistem akan secara otomatis menghitung Gaji Pokok, Tunjangan, Lembur, Potongan BPJS, PPh21, dan Potongan Absensi.</p><div class="max-w-xs mx-auto text-left mb-6"><label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Pilih Periode Bulan</label><input type="month" id="pr-month" class="w-full bg-slate-900 text-white p-4 rounded-xl border border-slate-700 focus:border-indigo-500 outline-none" value="' + new Date().toISOString().substring(0,7) + '"></div><button onclick="runPayrollEngine()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-indigo-500/30 text-lg uppercase tracking-wide">Jalankan Proses (Run)</button></div>';
        }

        window.runPayrollEngine = function() {
            if(typeof Swal === 'undefined') return alert("Library modul belum termuat.");
            var m = document.getElementById('pr-month').value;
            Swal.fire({ title: 'Jalankan Payroll?', text: 'Menghitung gaji untuk periode ' + m + '.', icon: 'info', showCancelButton: true, confirmButtonColor: '#4f46e5', confirmButtonText: 'Mulai Kalkulasi', background: '#1e293b', color: '#fff' }).then(function(result){
                if (result.isConfirmed) { 
                    showLoader("Kalkulasi Payroll Berjalan..."); 
                    apiCall('generatePayrollData', { month: m })
                        .then(function(res) { hideLoader(); safeSwal('Selesai!', res.message, 'success'); navigate('Payroll'); })
                        .catch(function(err) { hideLoader(); safeSwal('Gagal', String(err), 'error'); });
                }
            });
        }

        function loadReportUI(container) {
            container.innerHTML = '<div class="max-w-2xl mx-auto glass-panel p-8 rounded-3xl"><h2 class="text-2xl font-bold text-white mb-6"><i class="fas fa-print text-emerald-400 mr-2"></i>Cetak Laporan</h2><div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6"><div><label class="block text-xs text-slate-400 mb-1">Jenis Laporan</label><select id="rep-type" class="w-full bg-slate-800 text-white p-3 rounded-lg border border-slate-700"><option>Absensi Harian</option><option>Keterlambatan</option><option>Izin/Cuti</option><option>Data Lembur</option><option>Payroll</option></select></div><div><label class="block text-xs text-slate-400 mb-1">Tgl Mulai</label><input type="date" id="rep-start" class="w-full bg-slate-800 text-white p-3 rounded-lg border border-slate-700"></div><div><label class="block text-xs text-slate-400 mb-1">Tgl Selesai</label><input type="date" id="rep-end" class="w-full bg-slate-800 text-white p-3 rounded-lg border border-slate-700"></div></div><button onclick="generateReport()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-emerald-500/30"><i class="fas fa-search mr-2"></i>Tampilkan Laporan</button><div id="rep-result" class="mt-8 overflow-x-auto hide-scrollbar"></div></div>';
        }

        window.generateReport = function() {
            var t = document.getElementById('rep-type').value, s = document.getElementById('rep-start').value, e = document.getElementById('rep-end').value;
            showLoader("Menarik Data...");
            apiCall('getReportData', { type: t, start: s, end: e })
                .then(function(data) {
                    hideLoader(); var html = '';
                    if(data.length === 0) html = '<p class="text-center text-slate-400">Tidak ada data untuk periode ini.</p>';
                    else {
                        var keys = Object.keys(data[0]).filter(function(k){ return k !== 'ID' && !k.startsWith('_'); });
                        var thead = keys.map(function(k){ return '<th class="p-3 bg-slate-800 font-semibold text-left text-xs">' + k + '</th>'; }).join('');
                        var tbody = data.map(function(r){ return '<tr>' + keys.map(function(k){ return '<td class="p-3 border-b border-slate-800 text-sm whitespace-nowrap">' + (r[k] !== undefined ? r[k] : '') + '</td>'; }).join('') + '</tr>'; }).join('');
                        html = '<div class="border border-slate-700 rounded-xl overflow-hidden"><table class="w-full text-slate-300"><thead><tr>' + thead + '</tr></thead><tbody>' + tbody + '</tbody></table></div>';
                    }
                    document.getElementById('rep-result').innerHTML = html;
                })
                .catch(function(err) { hideLoader(); safeSwal('Error Server', String(err), 'error'); });
        }

        function renderLogin() {
            return '<div class="min-h-screen w-full flex items-center justify-center p-4 bg-slate-900 relative">' +
                   '<div class="absolute inset-0 z-0 overflow-hidden"><div class="absolute -top-[10%] -left-[10%] w-96 h-96 bg-blue-500/20 rounded-full blur-3xl"></div><div class="absolute bottom-[10%] -right-[10%] w-96 h-96 bg-indigo-500/20 rounded-full blur-3xl"></div></div>' +
                   '<div class="glass-panel w-full max-w-md p-8 rounded-3xl z-10 shadow-2xl relative border-t-4 border-t-blue-500">' +
                   '<div class="text-center mb-10"><h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-400 mb-1">CV JAMPE</h1><h2 class="text-sm font-bold text-slate-300 tracking-[0.3em] uppercase">Ageng Trade</h2></div>' +
                   '<form onsubmit="event.preventDefault(); doLogin();" class="space-y-6">' +
                   '<div><label class="block text-xs font-bold text-slate-400 uppercase tracking-wide mb-2 ml-1">Email Akses</label><div class="relative"><i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i><input type="text" id="login-email" required class="w-full bg-slate-900/80 text-white pl-12 pr-4 py-4 rounded-2xl border border-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition" placeholder="admin / user"></div></div>' +
                   '<div><label class="block text-xs font-bold text-slate-400 uppercase tracking-wide mb-2 ml-1">Kata Sandi</label><div class="relative"><i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i><input type="password" id="login-pass" required class="w-full bg-slate-900/80 text-white pl-12 pr-4 py-4 rounded-2xl border border-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition" placeholder="••••••••"></div></div>' +
                   '<button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-4 rounded-2xl mt-8 transition-transform transform hover:scale-[1.02] shadow-lg shadow-blue-500/25">Login System</button>' +
                   '</form></div></div>';
        }

        window.doLogin = function() {
            var e = document.getElementById('login-email').value, p = document.getElementById('login-pass').value;
            showLoader("Otentikasi Kredensial...");
            
            apiCall('login', { email: e, password: p })
                .then(function(res) {
                    if(res.success) { 
                        STATE.user = res.name; STATE.role = res.role; STATE.token = res.token; STATE.employeeData = res.employee; 
                        navigate('dashboard'); if(Toast) Toast.fire({icon: 'success', title: 'Selamat datang, ' + res.name}); 
                    }
                    else { hideLoader(); safeSwal('Akses Ditolak', res.message, 'error'); }
                })
                .catch(function(err) { hideLoader(); safeSwal('Error Server', String(err), 'error'); });
        }

        window.doLogout = function() { 
            STATE = { user: null, role: null, currentView: 'login', token: null, employeeData: null, cache: { PendingCounts: {izin: 0, absen: 0, shift: 0, total: 0} } }; 
            navigate('login'); 
        }

        // --- 7. PELUNCURAN (FAILSAFE) ---
        function bootApp() {
            if(window.isBooted) return;
            window.isBooted = true;
            try {
                var initL = document.getElementById('init-loader');
                if(initL) initL.style.display = 'none';
                navigate('login');
            } catch (e) {
                var errCatcher = document.getElementById('error-catcher');
                if(errCatcher) {
                    errCatcher.style.display = 'flex';
                    document.getElementById('error-message').innerText = "Boot Error: " + e.message;
                } else { alert("Boot Error: " + e.message); }
            }
        }
        
        bootApp(); 
    </script>
</body>
</html>
